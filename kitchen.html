<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 The Kitchen</title>
    <style>
        :root { --bg: #fcfaf2; --sand: #e6dfd3; --olive: #707a65; --text: #3a3d35; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; }
        .navbar { display: flex; justify-content: center; background: var(--sand); padding: 1rem; border-bottom: 2px dashed var(--olive); gap: 1.5rem; }
        .navbar a { text-decoration: none; color: var(--text); font-weight: bold; padding: 0.5rem 1rem; border-radius: 10px; }
        .navbar a:hover, .navbar a.active { background: var(--olive); color: var(--bg); }

        .kitchen-stage { max-width: 600px; margin: 3rem auto; text-align: center; }
        
        /* Interactive Fridge Graphic */
        .fridge {
            width: 300px;
            height: 450px;
            background: #f0ede6;
            margin: 0 auto;
            border-radius: 20px 20px 10px 10px;
            border: 3px solid var(--sand);
            position: relative;
            box-shadow: 8px 8px 0px var(--sand);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .fridge:hover { transform: scale(1.02); }
        .fridge-handle {
            width: 15px;
            height: 120px;
            background: #b0b5a9;
            position: absolute;
            right: 20px;
            top: 150px;
            border-radius: 10px;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
        }
        .fridge-line {
            width: 100%;
            height: 4px;
            background: var(--sand);
            position: absolute;
            top: 130px;
        }

        /* Pantry Reveal Grid */
        .pantry-contents {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .food-polaroid {
            background: #fff;
            padding: 10px 10px 25px 10px;
            border: 1px solid var(--sand);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.05);
            transform: rotate(-3deg);
        }
        .food-polaroid img { width: 100%; height: 130px; object-fit: cover; }
        .food-title { font-size: 0.85rem; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <script>if(sessionStorage.getItem("vault_accessed") !== "true"){ window.location.href = "index.html"; }</script>

    <div class="navbar">
        <a href="hub.html">🏡 Hub</a>
        <a href="gallery.html">🎞️ Gallery</a>
        <a href="kitchen.html" class="active">🍕 Kitchen</a>
        <a href="desktop.html">🎮 Arcade</a>
    </div>

    <div class="kitchen-stage">
        <h2>Tap the fridge door to peek inside...</h2>
        
        <div class="fridge" id="fridgeDoor" onclick="openFridge()">
            <div class="fridge-line"></div>
            <div class="fridge-handle"></div>
        </div>

        <div class="pantry-contents" id="pantry">
            <!-- Item 1 -->
            <div class="food-polaroid">
                <img src="YOUR_FOOD_PIC_URL" alt="Plant Patty">
                <div class="food-title">Plant-Based Burgers 🍔</div>
            </div>
            <!-- Item 2 -->
            <div class="food-polaroid" style="transform: rotate(3deg);">
                <img src="YOUR_DRINK_PIC_URL" alt="Matcha Bowl">
                <div class="food-title">Matcha Acai Bowl 🍵</div>
            </div>
        </div>
    </div>

    <script>
        function openFridge() {
            document.getElementById('fridgeDoor').style.display = 'none';
            document.getElementById('pantry').style.display = 'grid';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Capsule</title>
    <!-- Crypto-JS for secure client-side decryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfaf2;     /* Ivory */
            --sand: #e6dfd3;         /* Warm Sand */
            --olive: #707a65;        /* Olive Green */
            --text-dark: #3a3d35;    /* Soft Black */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Organic plant-like background trinkets */
        body::before, body::after {
            content: "🌿";
            position: absolute;
            font-size: 5rem;
            opacity: 0.15;
        }
        body::before { top: 10%; left: 10%; transform: rotate(-15deg); }
        body::after { bottom: 10%; right: 10%; transform: rotate(45deg); }

        .lock-container {
            background: var(--sand);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(112, 122, 101, 0.2);
            text-align: center;
            border: 1px solid rgba(112, 122, 101, 0.3);
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            color: var(--olive);
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        input[type="password"] {
            width: 80%;
            padding: 0.8rem;
            border: 1px solid var(--olive);
            background: var(--bg-color);
            border-radius: 25px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            box-shadow: 0 0 10px rgba(112, 122, 101, 0.5);
        }

        button {
            margin-top: 1.5rem;
            background: var(--olive);
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 1px;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #5b6452;
        }

        .error-msg {
            color: #a94442;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="lock-container">
        <h1>MEMORIA</h1>
        <p>🔒 entirely private archive</p>
        <input type="password" id="passkey" placeholder="enter secret key...">
        <br>
        <button onclick="checkPassword()">Unlock</button>
        <div class="error-msg" id="error">Invalid key. The vault remains closed.</div>
    </div>

    <script>
        // Simple, effective front-end protection for personal sites
        // Hashing the password check so it isn't visible in plain text via 'View Source'
        const superSecretHash = "ef92b778bafe771e89245b89ecbc08a44a4e166c06659911881f383d4473e94f"; // SHA-256 of your password

        function checkPassword() {
            const password = document.getElementById("passkey").value;
            const hashedInput = CryptoJS.SHA256(password).toString();
            
            if (hashedInput === superSecretHash) {
                // Save token temporarily so you don't log out while clicking tabs
                sessionStorage.setItem("vault_accessed", "true");
                // Redirecting to the main dashboard
                window.location.href = "hub.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }

        // Allow pressing 'Enter' to submit
        document.getElementById("passkey").addEventListener("keyup", function(event) {
            if (event.key === "Enter") { checkPassword(); }
        });
    </script>
</body>
</html>
